<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta charset="UTF-8">
    <title>RA Kelly Silva - Solução Final</title>
    
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>

    <style>
        /* Impede qualquer divisão de tela ou rolagem */
        body { margin: 0; overflow: hidden; background: #000; touch-action: none; }
        
        /* Mata o modo VR e ícones de óculos que dividem a tela */
        .a-enter-vr, .a-enter-ar, .a-orientation-modal, .a-loader-title { 
            display: none !important; 
        }

        /* Camada de Início */
        #overlay { 
            position: absolute; z-index: 9999; top: 0; left: 0; width: 100%; height: 100%; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            background: #000; color: white; font-family: sans-serif;
        }
        
        button { 
            padding: 20px 40px; font-size: 18px; cursor: pointer; border-radius: 50px; 
            border: 2px solid #fff; background: transparent; color: #fff; font-weight: bold; 
            text-transform: uppercase;
        }

        #msg { margin-top: 20px; font-size: 14px; color: #888; }
    </style>
</head>
<body>

    <div id="overlay">
        <button id="btn-start">INICIAR EXPERIÊNCIA</button>
        <div id="msg">Aguardando interação...</div>
    </div>

    <a-scene 
        mindar-image="imageTargetSrc: targets.mind; autoStart: false; uiLoading: no; uiScanning: yes;" 
        embedded 
        vr-mode-ui="enabled: false" 
        device-orientation-permission-ui="enabled: false"
        color-space="sRGB" 
        renderer="colorManagement: true, physicallyCorrectLights">
        
        <a-assets>
            <video id="vid" 
                   src="https://video.wixstatic.com/video/886022_77553c517c3b429899495057155559a9/720p/mp4/file.mp4" 
                   preload="auto" loop="true" crossorigin="anonymous" playsinline webkit-playsinline>
            </video>
        </a-assets>

        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <a-entity mindar-image-target="targetIndex: 0">
            <a-video src="#vid" width="1" height="1" position="0 0 0.1"></a-video>
        </a-entity>
    </a-scene>

    <script>
        const btn = document.getElementById('btn-start');
        const overlay = document.getElementById('overlay');
        const msg = document.getElementById('msg');
        const sceneEl = document.querySelector('a-scene');
        const video = document.getElementById('vid');

        btn.addEventListener('click', () => {
            msg.innerText = "Carregando câmera...";
            
            // Destrava o vídeo mudo primeiro (padrão de segurança mobile)
            video.play().then(() => {
                video.pause();
            });

            // Força a inicialização do MindAR
            const arSystem = sceneEl.systems['mindar-image-system'];
            arSystem.start(); 
        });

        // Quando a câmera abre de fato
        sceneEl.addEventListener("arReady", () => {
            overlay.style.display = "none";
            video.play(); // O som começa aqui
        });

        // Se der erro de permissão ou arquivo
        sceneEl.addEventListener("arError", (e) => {
            msg.innerText = "Erro ao acessar câmera. Verifique as permissões.";
            console.error(e);
        });
    </script>
</body>
</html>
