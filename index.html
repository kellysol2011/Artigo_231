<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta charset="UTF-8">
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.0/dist/mindar-image-aframe.prod.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #000; }
        .a-enter-vr, .a-enter-ar { display: none !important; }
        #overlay { 
            position: absolute; z-index: 9999; top: 0; left: 0; width: 100%; height: 100%; 
            display: flex; align-items: center; justify-content: center; background: #000; 
        }
        button { 
            padding: 20px 40px; font-size: 18px; cursor: pointer; border-radius: 50px; 
            border: 2px solid #fff; background: transparent; color: #fff; font-weight: bold; 
        }
    </style>
</head>
<body>
    <div id="overlay"><button id="btn">INICIAR EXPERIÊNCIA</button></div>

    <a-scene 
        mindar-image="imageTargetSrc: targets.mind; autoStart: false; uiScanning: yes;" 
        embedded 
        vr-mode-ui="enabled: false" 
        device-orientation-permission-ui="enabled: false"
        renderer="precision: mediump; antialias: false; alpha: true;">
        
        <a-assets>
            <video id="vid" src="https://video.wixstatic.com/video/886022_77553c517c3b429899495057155559a9/720p/mp4/file.mp4" 
                   preload="auto" loop crossorigin="anonymous" playsinline webkit-playsinline></video>
        </a-assets>

        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <a-entity mindar-image-target="targetIndex: 0">
            <a-video src="#vid" width="1" height="1" position="0 0 0.1" transparent="false"></a-video>
        </a-entity>
    </a-scene>

    <script>
        const btn = document.getElementById('btn');
        const video = document.getElementById('vid');
        const sceneEl = document.querySelector('a-scene');

        btn.addEventListener('click', () => {
            document.getElementById('overlay').style.display = 'none';
            const arSystem = sceneEl.systems['mindar-image-system'];
            
            // Inicia o motor
            arSystem.start(); 
            
            // Tenta tocar o vídeo (pode começar mudo se o navegador barrar, mas o 'arReady' garante depois)
            video.play().catch(() => { console.log("Aguardando sistema estar pronto..."); });
        });

        // Quando a câmera de fato aparecer, forçamos o vídeo a dar play de novo
        sceneEl.addEventListener("arReady", () => {
            video.play();
        });
    </script>
</body>
</html>
