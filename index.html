<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta charset="UTF-8">
    <title>Obra RA - Kelly Silva</title>
    
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.0/dist/mindar-image-aframe.prod.js"></script>

    <style>
        /* Resolve o erro da "Metade da Tela" e faixas pretas */
        html, body { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            overflow: hidden; background-color: #000; 
        }

        /* Remove interface de VR que causa a divisão da tela no celular/PC */
        .a-enter-vr, .a-enter-ar, .a-orientation-modal, .mindar-ui-loading, .mindar-ui-scanning { 
            display: none !important; 
        }

        /* Força a câmera a ocupar o fundo real da página */
        canvas.a-canvas { 
            width: 100% !important; height: 100% !important; 
            top: 0; left: 0; position: absolute; 
        }

        /* Camada de início (Overlay) */
        #overlay { 
            position: absolute; z-index: 9999; top: 0; left: 0; 
            width: 100%; height: 100%; display: flex; 
            align-items: center; justify-content: center; 
            background: #000; 
        }

        button { 
            padding: 20px 40px; font-size: 18px; cursor: pointer; 
            border-radius: 50px; border: 2px solid #fff; 
            background: transparent; color: #fff; font-weight: bold; 
            text-transform: uppercase;
        }

        /* Mensagem de "Carregando" customizada */
        #loading-msg {
            display: none; color: white; font-family: sans-serif; position: absolute; bottom: 20%;
        }
    </style>
</head>
<body>

    <div id="overlay">
        <button id="btn-start">Iniciar Experiência</button>
        <div id="loading-msg">Iniciando câmera...</div>
    </div>

    <a-scene 
        mindar-image="imageTargetSrc: targets.mind; autoStart: false; uiScanning: no; uiLoading: no;" 
        embedded 
        vr-mode-ui="enabled: false" 
        device-orientation-permission-ui="enabled: false"
        color-space="sRGB" 
        renderer="colorManagement: true, physicallyCorrectLights">
        
        <a-assets>
            <video id="vid" 
                   src="https://video.wixstatic.com/video/886022_77553c517c3b429899495057155559a9/720p/mp4/file.mp4" 
                   preload="auto" loop="true" crossorigin="anonymous" 
                   playsinline webkit-playsinline>
            </video>
        </a-assets>

        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <a-entity mindar-image-target="targetIndex: 0">
            <a-video src="#vid" width="1" height="1" position="0 0 0.1"></a-video>
        </a-entity>
    </a-scene>

    <script>
        const btn = document.getElementById('btn-start');
        const msg = document.getElementById('loading-msg');
        const sceneEl = document.querySelector('a-scene');
        const video = document.getElementById('vid');

        btn.addEventListener('click', () => {
            btn.style.display = 'none';
            msg.style.display = 'block';
            
            // Inicia o motor de RA
            const arSystem = sceneEl.systems['mindar-image-system'];
            arSystem.start(); 
        });

        // Evento: Câmera abriu e sistema está pronto
        sceneEl.addEventListener("arReady", () => {
            document.getElementById('overlay').style.display = 'none';
            // O som só começa aqui, quando a tela azul/preta some
            video.play();
        });

        // Evento: Erro (Arquivo não encontrado ou Câmera bloqueada)
        sceneEl.addEventListener("arError", () => {
            alert("Erro: Verifique se o arquivo targets.mind está no GitHub e se você permitiu a câmera.");
            location.reload();
        });

        // Garantia extra: Tocar quando encontrar a imagem
        sceneEl.addEventListener("targetFound", () => {
            video.play();
        });
    </script>
</body>
</html>
