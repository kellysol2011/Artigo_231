<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta charset="UTF-8">
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.0/dist/mindar-image-aframe.prod.js"></script>
    <style>
        /* Força a tela a não dividir e esconde botões desnecessários */
        body { margin: 0; overflow: hidden; }
        .a-enter-vr { display: none !important; }
        
        #overlay { 
            position: absolute; z-index: 999; top: 0; left: 0; width: 100%; height: 100%; 
            display: flex; align-items: center; justify-content: center; background: #000; 
        }
        button { 
            padding: 15px 30px; font-size: 18px; cursor: pointer; border-radius: 10px; 
            border: none; background: #fff; color: #000; font-weight: bold; 
        }
    </style>
</head>
<body>
    <div id="overlay"><button id="btn">INICIAR EXPERIÊNCIA</button></div>

    <a-scene 
        mindar-image="imageTargetSrc: ./targets.mind; autoStart: false; uiScanning: yes;" 
        embedded 
        vr-mode-ui="enabled: false" 
        device-orientation-permission-ui="enabled: true"
        color-space="sRGB" 
        renderer="colorManagement: true, physicallyCorrectLights">
        
        <a-assets>
            <video id="vid" src="https://video.wixstatic.com/video/886022_77553c517c3b429899495057155559a9/720p/mp4/file.mp4" 
                   preload="auto" loop="true" crossorigin="anonymous" playsinline></video>
        </a-assets>

        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <a-entity mindar-image-target="targetIndex: 0">
            <a-video src="#vid" width="1" height="0.56" position="0 0 0"></a-video>
        </a-entity>
    </a-scene>

    <script>
        const btn = document.getElementById('btn');
        const sceneEl = document.querySelector('a-scene');
        const video = document.getElementById('vid');

        btn.addEventListener('click', () => {
            document.getElementById('overlay').style.display = 'none';
            
            // Inicia o sistema de imagem e a câmera apenas no clique
            const arSystem = sceneEl.systems['mindar-image-system'];
            arSystem.start(); 

            // O vídeo só toca após a câmera iniciar
            video.play();
        });

        // Garante que se a câmera falhar, o som não fique tocando sozinho no fundo
        sceneEl.addEventListener('arError', () => {
            video.pause();
            alert("Erro ao acessar a câmera. Verifique as permissões.");
        });
    </script>
</body>
</html>
