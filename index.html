<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>REALIDADE AUMENTADA</title>
    <style>
        body { margin: 0; overflow: hidden; }
        .instructions {
            position: fixed;
            bottom: 20px;
            left: 20px;
            right: 20px;
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 15px;
            border-radius: 20px;
            text-align: center;
            z-index: 100;
            font-size: 14px;
        }
        .status {
            position: fixed;
            top: 20px;
            left: 20px;
            background: rgba(0,0,0,0.7);
            color: #ffd700;
            padding: 8px 16px;
            border-radius: 20px;
            z-index: 100;
            font-size: 12px;
        }
        .btn-start {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: #2ecc71;
            color: white;
            border: none;
            padding: 16px 32px;
            border-radius: 50px;
            font-size: 18px;
            font-weight: bold;
            z-index: 200;
            cursor: pointer;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.0/dist/mindar-image.prod.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.132.2/build/three.min.js"></script>
</head>
<body>
    <div class="status" id="status">⏳ Pronto</div>
    <div class="instructions">🎯 Aponte a câmera para a imagem impressa</div>
    <button class="btn-start" id="startBtn">📷 INICIAR AR</button>

    <script>
        const VIDEO_URL = "https://video.wixstatic.com/video/886022_77553c517c3b429899495057155559a9/720p/mp4/file.mp4";
        
        // USA A IMAGEM LOCAL (você precisa colocar o arquivo target.jpg na mesma pasta)
        const TARGET_IMAGE = "target.jpg";
        
        const startBtn = document.getElementById('startBtn');
        const statusDiv = document.getElementById('status');
        
        startBtn.addEventListener('click', () => {
            startBtn.style.display = 'none';
            statusDiv.innerHTML = "🎥 Iniciando...";
            
            const mindar = document.createElement('mindar-image');
            mindar.setAttribute('auto-start', 'true');
            mindar.style.width = '100%';
            mindar.style.height = '100%';
            mindar.style.position = 'fixed';
            mindar.style.top = '0';
            mindar.style.left = '0';
            
            mindar.targets = [{
                imageUrl: TARGET_IMAGE,
                threshold: 0.7,
                width: 1.0
            }];
            
            document.body.appendChild(mindar);
            
            let videoAdded = false;
            
            mindar.addEventListener('load', () => {
                statusDiv.innerHTML = "🔍 Escaneando...";
            });
            
            mindar.addEventListener('targetFound', () => {
                statusDiv.innerHTML = "🎯 IMAGEM DETECTADA!";
                if (!videoAdded) {
                    videoAdded = true;
                    const video = document.createElement('a-video');
                    video.setAttribute('src', VIDEO_URL);
                    video.setAttribute('width', '1.2');
                    video.setAttribute('height', '0.68');
                    video.setAttribute('autoplay', 'true');
                    video.setAttribute('loop', 'true');
                    video.setAttribute('controls', 'true');
                    
                    const marker = mindar.querySelector('.mindar-marker');
                    if (marker) marker.appendChild(video);
                }
            });
            
            mindar.addEventListener('targetLost', () => {
                statusDiv.innerHTML = "🔍 Imagem perdida";
                const v = document.querySelector('a-video');
                if (v) v.remove();
                videoAdded = false;
            });
            
            mindar.start();
        });
    </script>
</body>
</html>
