<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta charset="UTF-8">
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.0/dist/mindar-image-aframe.prod.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #000; }
        #start-btn { 
            position: absolute; z-index: 9999; top: 50%; left: 50%; 
            transform: translate(-50%, -50%); padding: 20px; 
            background: white; border: none; border-radius: 10px; font-weight: bold;
        }
    </style>
</head>
<body>
    <button id="start-btn">CLIQUE AQUI PARA ATIVAR CÂMERA</button>

    <a-scene mindar-image="imageTargetSrc: ./targets.mind; autoStart: false;" 
             embedded color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights" 
             vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: true">
        
        <a-assets>
            <video id="vid" src="https://video.wixstatic.com/video/886022_77553c517c3b429899495057155559a9/720p/mp4/file.mp4" 
                   preload="auto" loop crossorigin="anonymous" playsinline></video>
        </a-assets>

        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <a-entity id="target" mindar-image-target="targetIndex: 0">
            <a-video src="#vid" width="1" height="0.56" position="0 0 0"></a-video>
        </a-entity>
    </a-scene>

    <script>
        const btn = document.querySelector("#start-btn");
        const sceneEl = document.querySelector('a-scene');

        btn.addEventListener('click', () => {
            // Isso força o navegador a pedir permissão de câmera e sensores
            sceneEl.systems['mindar-image-system'].start(); 
            document.querySelector("#vid").play();
            btn.style.display = 'none';
        });
    </script>
</body>
</html>
