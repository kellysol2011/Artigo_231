<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Scanner de Imagem - Traços Finos</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            max-width: 450px;
            width: 100%;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 32px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }
        
        h1 {
            color: white;
            font-size: 1.5rem;
            margin-bottom: 8px;
        }
        
        .sub {
            color: #aaa;
            font-size: 0.85rem;
            margin-bottom: 20px;
        }
        
        .video-wrapper {
            position: relative;
            background: #000;
            border-radius: 20px;
            overflow: hidden;
            aspect-ratio: 4 / 3;
            margin-bottom: 16px;
        }
        
        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .btn-camera {
            background: #2ecc71;
            color: white;
            border: none;
            padding: 16px 32px;
            border-radius: 60px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            margin-bottom: 16px;
            transition: transform 0.2s;
        }
        
        .btn-camera:active {
            transform: scale(0.97);
        }
        
        .status {
            background: rgba(0,0,0,0.6);
            padding: 12px;
            border-radius: 12px;
            color: #ffd700;
            font-size: 0.85rem;
            font-weight: bold;
        }
        
        .similarity {
            margin-top: 12px;
            background: rgba(0,0,0,0.5);
            border-radius: 10px;
            padding: 8px;
            color: white;
            font-size: 0.85rem;
        }
        
        .progress-bar {
            margin-top: 8px;
            height: 8px;
            background: #333;
            border-radius: 4px;
            overflow: hidden;
        }
        
        .progress-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #f39c12, #e74c3c);
            transition: width 0.1s;
            border-radius: 4px;
        }
        
        .instruction {
            color: #ccc;
            font-size: 0.7rem;
            margin-top: 12px;
            line-height: 1.4;
        }
        
        .permission-hint {
            background: rgba(231,76,60,0.2);
            border: 1px solid #e74c3c;
            padding: 10px;
            border-radius: 12px;
            margin-top: 12px;
            font-size: 0.7rem;
            color: #e74c3c;
            display: none;
        }
        
        .debug {
            margin-top: 10px;
            font-size: 0.6rem;
            color: #aaa;
            word-break: break-all;
            max-height: 80px;
            overflow-y: auto;
            background: rgba(0,0,0,0.3);
            border-radius: 8px;
            padding: 8px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔍 Escaneie a Imagem</h1>
        <div class="sub">Aponte a câmera para o frame inicial</div>
        
        <div class="video-wrapper">
            <video id="video" autoplay playsinline muted></video>
        </div>
        
        <button class="btn-camera" id="startCameraBtn">📸 INICIAR CÂMERA</button>
        
        <div class="similarity">
            Correspondência: <span id="similarity-value">0</span>%
            <div class="progress-bar">
                <div class="progress-fill" id="progress-fill"></div>
            </div>
        </div>
        
        <div class="status" id="status">
            ⏳ Clique em "Iniciar Câmera"
        </div>
        
        <div class="instruction">
            💡 DICAS:<br>
            • Centralize a imagem na tela<br>
            • Mantenha o celular PARADO<br>
            • A imagem precisa estar bem iluminada
        </div>
        
        <div class="permission-hint" id="permissionHint">
            🔒 Permissão negada. Clique no ícone de câmera na barra de endereço.
        </div>
        
        <div class="debug" id="debug"></div>
    </div>

    <script>
        // ============================================
        // CONFIGURAÇÕES
        // ============================================
        
        const VIDEO_URL = "https://video.wixstatic.com/video/886022_77553c517c3b429899495057155559a9/720p/mp4/file.mp4";
        
        // Limiar de detecção (20% - bem baixo para testar)
        const SIMILARITY_THRESHOLD = 0.20;
        
        // ============================================
        
        const video = document.getElementById('video');
        const startBtn = document.getElementById('startCameraBtn');
        const statusDiv = document.getElementById('status');
        const similaritySpan = document.getElementById('similarity-value');
        const progressFill = document.getElementById('progress-fill');
        const permissionHint = document.getElementById('permissionHint');
        const debugDiv = document.getElementById('debug');
        
        let stream = null;
        let scanInterval = null;
        let targetData = null;
        let isVideoOpened = false;
        let lastSimilarities = [];
        
        function debugLog(msg) {
            console.log(msg);
            debugDiv.innerHTML = new Date().toLocaleTimeString() + " - " + msg + "<br>" + debugDiv.innerHTML;
            if (debugDiv.innerHTML.split("<br>").length > 6) {
                debugDiv.innerHTML = debugDiv.innerHTML.split("<br>").slice(0, 5).join("<br>");
            }
        }
        
        // SIMULAÇÃO de detecção para TESTE
        // Como não temos a imagem real, vamos simular um reconhecimento
        // quando o usuário clicar em um botão virtual
        
        function startSimulatedScanning() {
            let fakeSimilarity = 0;
            let increasing = true;
            
            scanInterval = setInterval(() => {
                // Simula aumento gradual da similaridade
                if (increasing) {
                    fakeSimilarity += 0.03;
                    if (fakeSimilarity >= SIMILARITY_THRESHOLD + 0.1) {
                        increasing = false;
                    }
                } else {
                    fakeSimilarity -= 0.02;
                    if (fakeSimilarity <= 0) {
                        increasing = true;
                    }
                }
                
                fakeSimilarity = Math.max(0, Math.min(0.6, fakeSimilarity));
                
                const percent = Math.round(fakeSimilarity * 100);
                similaritySpan.textContent = percent;
                progressFill.style.width = percent + "%";
                
                if (fakeSimilarity >= SIMILARITY_THRESHOLD && !isVideoOpened) {
                    statusDiv.innerHTML = `✅ SIMULAÇÃO: Imagem reconhecida! Abrindo vídeo...`;
                    isVideoOpened = true;
                    setTimeout(() => {
                        window.location.href = VIDEO_URL;
                    }, 500);
                } else {
                    statusDiv.innerHTML = `🔍 SIMULAÇÃO: Escaneando... ${percent}%`;
                }
                
            }, 200);
        }
        
        // Versão REAL com TensorFlow (tenta carregar)
        async function startRealRecognition() {
            debugLog("Carregando TensorFlow.js...");
            
            // Carrega o TensorFlow dinamicamente
            const tfScript = document.createElement('script');
            tfScript.src = "https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.15.0/dist/tf.min.js";
            document.head.appendChild(tfScript);
            
            tfScript.onload = () => {
                debugLog("TensorFlow carregado, carregando MobileNet...");
                
                const mobilenetScript = document.createElement('script');
                mobilenetScript.src = "https://cdn.jsdelivr.net/npm/@tensorflow-models/mobilenet@2.1.1/dist/mobilenet.min.js";
                document.head.appendChild(mobilenetScript);
                
                mobilenetScript.onload = () => {
                    debugLog("MobileNet carregado! Iniciando reconhecimento real...");
                    startRealScanning();
                };
            };
        }
        
        async function startRealScanning() {
            // Força CPU
            await tf.setBackend('cpu');
            
            // Carrega o modelo
            const model = await mobilenet.load();
            debugLog("Modelo MobileNet pronto");
            
            // Cria um canvas para processamento
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            
            // Carrega a imagem alvo (tentando contornar CORS)
            const targetImg = new Image();
            targetImg.crossOrigin = "Anonymous";
            
            // Tenta carregar a imagem com proxy CORS
            const targetUrl = "https://static.wixstatic.com/media/886022_cdf22739c43946babb0f7b02e640fee7~mv2.jpg";
            
            targetImg.onload = async () => {
                debugLog(`Imagem alvo carregada: ${targetImg.width}x${targetImg.height}`);
                
                canvas.width = 224;
                canvas.height = 224;
                ctx.drawImage(targetImg, 0, 0, 224, 224);
                
                const targetTensor = tf.browser.fromPixels(canvas);
                const targetFeatures = await model.infer(targetTensor, true);
                targetTensor.dispose();
                
                debugLog("Features da imagem alvo extraídas");
                statusDiv.innerHTML = "✅ Pronto! Aponte a câmera para a imagem";
                
                // Inicia o loop de escaneamento
                startScanningLoop(model, targetFeatures, canvas, ctx);
            };
            
            targetImg.onerror = (err) => {
                debugLog("❌ Erro ao carregar imagem do Wix (CORS bloqueado)");
                debugLog("Usando modo de simulação...");
                statusDiv.innerHTML = "⚠️ Modo simulação - Clique para testar";
                startSimulatedScanning();
            };
            
            targetImg.src = targetUrl;
        }
        
        function startScanningLoop(model, targetFeatures, canvas, ctx) {
            let lastSimilarity = 0;
            let stableCount = 0;
            
            scanInterval = setInterval(async () => {
                if (!video.videoWidth || !video.videoHeight) return;
                
                canvas.width = 224;
                canvas.height = 224;
                ctx.drawImage(video, 0, 0, 224, 224);
                
                const frameTensor = tf.browser.fromPixels(canvas);
                const frameFeatures = await model.infer(frameTensor, true);
                
                // Calcula similaridade
                const similarity = cosineSimilarity(targetFeatures, frameFeatures);
                frameTensor.dispose();
                frameFeatures.dispose();
                
                const percent = Math.round(similarity * 100);
                similaritySpan.textContent = percent;
                progressFill.style.width = percent + "%";
                
                if (similarity >= SIMILARITY_THRESHOLD) {
                    progressFill.style.background = "linear-gradient(90deg, #2ecc71, #27ae60)";
                    
                    if (Math.abs(similarity - lastSimilarity) < 0.05) {
                        stableCount++;
                    } else {
                        stableCount = 0;
                    }
                    
                    if (stableCount >= 5 && !isVideoOpened) {
                        debugLog(`✅ RECONHECIDO! Similaridade: ${percent}%`);
                        statusDiv.innerHTML = `✅ IMAGEM RECONHECIDA! Abrindo vídeo...`;
                        isVideoOpened = true;
                        setTimeout(() => { window.location.href = VIDEO_URL; }, 500);
                    } else {
                        statusDiv.innerHTML = `🎯 Detectando... ${percent}% - Mantenha firme`;
                    }
                } else {
                    stableCount = 0;
                    progressFill.style.background = "linear-gradient(90deg, #f39c12, #e74c3c)";
                    statusDiv.innerHTML = `🔍 Escaneando... ${percent}%`;
                }
                
                lastSimilarity = similarity;
            }, 150);
        }
        
        function cosineSimilarity(features1, features2) {
            const a = features1.dataSync();
            const b = features2.dataSync();
            
            let dot = 0, normA = 0, normB = 0;
            for (let i = 0; i < a.length; i++) {
                dot += a[i] * b[i];
                normA += a[i] * a[i];
                normB += b[i] * b[i];
            }
            if (normA === 0 || normB === 0) return 0;
            return dot / (Math.sqrt(normA) * Math.sqrt(normB));
        }
        
        async function startCamera() {
            if (stream) {
                stream.getTracks().forEach(track => track.stop());
                if (scanInterval) clearInterval(scanInterval);
            }
            
            statusDiv.innerHTML = "🎥 Solicitando acesso à câmera...";
            
            try {
                try {
                    stream = await navigator.mediaDevices.getUserMedia({ 
                        video: { facingMode: { exact: "environment" } } 
                    });
                    debugLog("✅ Câmera traseira ativada");
                } catch (e) {
                    stream = await navigator.mediaDevices.getUserMedia({ video: true });
                    debugLog("✅ Câmera padrão ativada");
                }
                
                video.srcObject = stream;
                await new Promise((resolve) => {
                    video.onloadedmetadata = () => { video.play(); resolve(); };
                });
                
                statusDiv.innerHTML = "🔄 Carregando IA...";
                startBtn.style.display = 'none';
                permissionHint.style.display = 'none';
                
                // Inicia o reconhecimento real
                startRealRecognition();
                
            } catch (error) {
                debugLog("❌ Erro: " + error.message);
                statusDiv.innerHTML = "❌ Erro: " + error.message;
                if (error.name === 'NotAllowedError') {
                    permissionHint.style.display = 'block';
                }
            }
        }
        
        startBtn.addEventListener('click', startCamera);
        
        window.addEventListener('beforeunload', () => {
            if (stream) stream.getTracks().forEach(track => track.stop());
            if (scanInterval) clearInterval(scanInterval);
        });
        
        debugLog("App pronto. Clique em Iniciar Câmera");
    </script>
</body>
</html>
