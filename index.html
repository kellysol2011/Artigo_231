<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta charset="UTF-8">
    <title>RA Kelly - Versão CSS</title>
    
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image.prod.js"></script>

    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; }
        #container { width: 100vw; height: 100vh; position: relative; overflow: hidden; }
        
        /* Camada de Início */
        #overlay { 
            position: absolute; z-index: 999; top: 0; left: 0; width: 100%; height: 100%; 
            display: flex; align-items: center; justify-content: center; background: #000; 
        }
        button { 
            padding: 20px 40px; font-size: 18px; cursor: pointer; border-radius: 50px; 
            border: 2px solid #fff; background: #000; color: #fff; font-weight: bold; 
        }

        /* O vídeo que vai aparecer sobre a obra */
        #paint-area {
            display: none;
            position: absolute;
            width: 300px; /* Será ajustado pelo JS */
            height: 300px;
        }
        video { width: 100%; height: 100%; object-fit: cover; }
    </style>
</head>
<body>
    <div id="overlay"><button id="btn">INICIAR EXPERIÊNCIA</button></div>

    <div id="container">
        <div id="paint-area">
            <video id="vid" src="https://video.wixstatic.com/video/886022_77553c517c3b429899495057155559a9/720p/mp4/file.mp4" 
                   loop crossorigin="anonymous" playsinline webkit-playsinline></video>
        </div>
    </div>

    <script>
        const btn = document.getElementById('btn');
        const video = document.getElementById('vid');
        const paintArea = document.getElementById('paint-area');

        btn.addEventListener('click', () => {
            document.getElementById('overlay').style.display = 'none';
            startAR();
        });

        const startAR = async () => {
            const mindarThree = new window.MINDAR.IMAGE.MindARSDK({
                container: document.querySelector("#container"),
                imageTargetSrc: "targets.mind",
                uiLoading: "no",
                uiScanning: "yes"
            });

            await mindarThree.start();

            // Quando encontrar a imagem (index 0)
            mindarThree.on("targetFound", (index) => {
                paintArea.style.display = "block";
                video.play();
                video.muted = false;
            });

            // Quando perder a imagem
            mindarThree.on("targetLost", (index) => {
                paintArea.style.display = "none";
                video.pause();
            });

            // Atualiza a posição do vídeo para seguir a imagem
            mindarThree.on("update", (data) => {
                if (data.type === "update") {
                    const { worldMatrix } = data;
                    // O Mind-AR CSS cuida de posicionar o elemento paint-area automaticamente
                }
            });
        };
    </script>
</body>
</html>
