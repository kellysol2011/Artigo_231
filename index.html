<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta charset="UTF-8">
    <title>RA Kelly Silva</title>
    
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/hiukim/mind-ar-js@1.1.5/dist/mindar-image-aframe.prod.js"></script>

    <style>
        body { margin: 0; overflow: hidden; background: #000; }
        
        /* Mata qualquer tentativa de dividir a tela ou mostrar ícones de óculos */
        .a-enter-vr, .a-enter-ar, .a-orientation-modal { display: none !important; }
        
        #overlay { 
            position: absolute; z-index: 1000; top: 0; left: 0; width: 100%; height: 100%; 
            display: flex; align-items: center; justify-content: center; background: #000; 
        }
        
        button { 
            padding: 20px 40px; font-size: 18px; cursor: pointer; border-radius: 50px; 
            border: 2px solid #fff; background: transparent; color: #fff; font-weight: bold; 
        }
    </style>
</head>
<body>

    <div id="overlay">
        <button id="btn-start">INICIAR EXPERIÊNCIA</button>
    </div>

    <a-scene 
        mindar-image="imageTargetSrc: targets.mind; autoStart: false;" 
        embedded 
        vr-mode-ui="enabled: false" 
        device-orientation-permission-ui="enabled: false"
        color-space="sRGB" 
        renderer="colorManagement: true, physicallyCorrectLights">
        
        <a-assets>
            <video id="vid" 
                   src="https://video.wixstatic.com/video/886022_77553c517c3b429899495057155559a9/720p/mp4/file.mp4" 
                   preload="auto" loop="true" crossorigin="anonymous" playsinline webkit-playsinline>
            </video>
        </a-assets>

        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <a-entity mindar-image-target="targetIndex: 0">
            <a-video src="#vid" width="1" height="1" position="0 0 0.1"></a-video>
        </a-entity>
    </a-scene>

    <script>
        const btn = document.getElementById('btn-start');
        const sceneEl = document.querySelector('a-scene');
        const video = document.getElementById('vid');

        btn.addEventListener('click', () => {
            // Esconde o botão e o fundo preto
            document.getElementById('overlay').style.display = "none";
            
            // Inicia o sistema de RA
            const arSystem = sceneEl.systems['mindar-image-system'];
            arSystem.start(); 
            
            // Tenta dar o play no vídeo (ele começará quando a RA estiver pronta)
            video.play().catch(() => {
                console.log("Aguardando permissão de áudio...");
            });
        });

        // Garante que o vídeo toque e a tela não divida após carregar
        sceneEl.addEventListener("arReady", () => {
            console.log("Câmera carregada!");
        });

        sceneEl.addEventListener("arError", () => {
            alert("Erro ao acessar a câmera. Verifique as permissões.");
        });
    </script>
</body>
</html>
