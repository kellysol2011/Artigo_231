<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>AR - Vídeo na Imagem | MindAR</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            margin: 0;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        
        /* Instruções na tela */
        .instructions {
            position: fixed;
            bottom: 20px;
            left: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(10px);
            color: white;
            padding: 14px 20px;
            border-radius: 50px;
            text-align: center;
            z-index: 100;
            font-size: 14px;
            font-weight: 500;
            pointer-events: none;
        }
        
        /* Botão de reiniciar */
        .btn-reset {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(52, 152, 219, 0.9);
            backdrop-filter: blur(5px);
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 40px;
            z-index: 100;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            pointer-events: auto;
        }
        
        .btn-reset:active {
            transform: scale(0.98);
        }
        
        /* Indicador de status */
        .status {
            position: fixed;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(5px);
            color: #ffd700;
            padding: 8px 16px;
            border-radius: 30px;
            z-index: 100;
            font-size: 12px;
            font-weight: bold;
            pointer-events: none;
        }
        
        /* Botão para abrir câmera manualmente */
        .start-camera-btn {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: #2ecc71;
            color: white;
            border: none;
            padding: 16px 32px;
            border-radius: 50px;
            font-size: 18px;
            font-weight: bold;
            z-index: 200;
            cursor: pointer;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
            animation: pulse 1.5s infinite;
            pointer-events: auto;
        }
        
        @keyframes pulse {
            0%, 100% { transform: translateX(-50%) scale(1); }
            50% { transform: translateX(-50%) scale(1.05); }
        }
        
        /* Container do vídeo AR */
        .ar-video-container {
            position: fixed;
            z-index: 200;
            display: none;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            border: 3px solid rgba(255,255,255,0.5);
        }
        
        .ar-video-container video {
            width: 100%;
            height: 100%;
            object-fit: contain;
            background: #000;
        }
        
        .close-video {
            position: absolute;
            top: 8px;
            right: 8px;
            background: rgba(0,0,0,0.7);
            color: white;
            border: none;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            font-size: 18px;
            cursor: pointer;
            z-index: 201;
        }
        
        .error-message {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(231, 76, 60, 0.95);
            color: white;
            padding: 20px;
            border-radius: 20px;
            text-align: center;
            z-index: 300;
            max-width: 80%;
            display: none;
        }
        
        /* Esconde o UI do MindAR que pode atrapalhar */
        mindar-image {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
    </style>
    <!-- MindAR Core -->
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.0/dist/mindar-image.prod.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.132.2/build/three.min.js"></script>
</head>
<body>
    <button class="btn-reset" onclick="location.reload()">🔄 Reiniciar</button>
    <div class="status" id="status">⏳ Clique em "Iniciar Câmera"</div>
    <div class="instructions">
        🎯 Aponte a câmera para a imagem do frame inicial
    </div>
    <button class="start-camera-btn" id="startCameraBtn">📷 INICIAR CÂMERA</button>
    <div class="error-message" id="errorMsg">❌ Erro</div>
    
    <div class="ar-video-container" id="arVideoContainer">
        <button class="close-video" id="closeVideoBtn">✕</button>
        <video id="arVideo" loop playsinline controls>
            <source src="https://video.wixstatic.com/video/886022_77553c517c3b429899495057155559a9/720p/mp4/file.mp4" type="video/mp4">
        </video>
    </div>

    <script>
        // ============================================
        // CONFIGURAÇÕES
        // ============================================
        
        const TARGET_IMAGE_URL = "https://static.wixstatic.com/media/886022_cdf22739c43946babb0f7b02e640fee7~mv2.jpg";
        const VIDEO_URL = "https://video.wixstatic.com/video/886022_77553c517c3b429899495057155559a9/720p/mp4/file.mp4";
        const DETECTION_THRESHOLD = 0.7;
        
        // ============================================
        
        const statusDiv = document.getElementById('status');
        const arVideoContainer = document.getElementById('arVideoContainer');
        const arVideo = document.getElementById('arVideo');
        const closeBtn = document.getElementById('closeVideoBtn');
        const errorMsgDiv = document.getElementById('errorMsg');
        const startCameraBtn = document.getElementById('startCameraBtn');
        
        let mindar = null;
        let isVideoShowing = false;
        let cameraStarted = false;
        
        function updateStatus(message, isError = false) {
            statusDiv.innerHTML = message;
            statusDiv.style.color = isError ? '#e74c3c' : '#ffd700';
            console.log("[STATUS]", message);
        }
        
        function showError(message) {
            errorMsgDiv.innerHTML = "❌ " + message;
            errorMsgDiv.style.display = 'block';
            setTimeout(() => {
                errorMsgDiv.style.display = 'none';
            }, 5000);
        }
        
        function hideVideo() {
            if (!isVideoShowing) return;
            isVideoShowing = false;
            arVideoContainer.style.display = 'none';
            arVideo.pause();
            updateStatus("🔍 Procurando imagem...");
        }
        
        function showVideoOnImage() {
            if (isVideoShowing) return;
            
            isVideoShowing = true;
            
            // Só carrega o vídeo quando necessário
            if (!arVideo.src || arVideo.src === "") {
                arVideo.src = VIDEO_URL;
            }
            
            const screenWidth = window.innerWidth;
            const videoWidth = Math.min(320, screenWidth - 40);
            const videoHeight = videoWidth * 9 / 16;
            const x = (screenWidth - videoWidth) / 2;
            const y = 80;
            
            arVideoContainer.style.display = 'block';
            arVideoContainer.style.left = x + 'px';
            arVideoContainer.style.top = y + 'px';
            arVideoContainer.style.width = videoWidth + 'px';
            arVideoContainer.style.height = videoHeight + 'px';
            
            arVideo.play().catch(e => {
                console.log("Precisa de interação do usuário para tocar");
            });
            
            updateStatus("✅ IMAGEM DETECTADA!");
        }
        
        closeBtn.addEventListener('click', hideVideo);
        
        // ============================================
        // INICIALIZAÇÃO DO MINDAR (SÓ DEPOIS DO BOTÃO)
        // ============================================
        
        async function startMindAR() {
            if (cameraStarted) return;
            
            updateStatus("🔄 Iniciando câmera e carregando IA...");
            
            try {
                // Cria o elemento mindar-image
                mindar = document.createElement('mindar-image');
                mindar.setAttribute('auto-start', 'true');
                
                // Configura a imagem alvo
                mindar.targets = [
                    {
                        imageUrl: TARGET_IMAGE_URL,
                        threshold: DETECTION_THRESHOLD,
                        width: 1.0
                    }
                ];
                
                document.body.appendChild(mindar);
                
                // Aguarda carregar
                await new Promise((resolve) => {
                    mindar.addEventListener('load', () => {
                        console.log("MindAR carregado");
                        resolve();
                    });
                    // Timeout por segurança
                    setTimeout(resolve, 5000);
                });
                
                // Evento: imagem encontrada
                mindar.addEventListener('targetFound', () => {
                    console.log("🎯 Imagem detectada!");
                    showVideoOnImage();
                });
                
                // Evento: imagem perdida
                mindar.addEventListener('targetLost', () => {
                    console.log("👋 Imagem perdida");
                    if (isVideoShowing) {
                        setTimeout(() => {
                            if (isVideoShowing) hideVideo();
                        }, 300);
                    }
                });
                
                // Inicia o MindAR
                await mindar.start();
                
                cameraStarted = true;
                startCameraBtn.style.display = 'none';
                updateStatus("🔍 Aponte para a imagem do frame inicial");
                
            } catch (error) {
                console.error("Erro:", error);
                updateStatus("❌ Erro ao iniciar câmera", true);
                showError("Não foi possível acessar a câmera. Verifique as permissões.");
                startCameraBtn.style.display = 'block';
            }
        }
        
        // Botão para iniciar câmera
        startCameraBtn.addEventListener('click', () => {
            startMindAR();
        });
        
        // Ajuste de tela
        window.addEventListener('resize', () => {
            if (isVideoShowing) {
                const screenWidth = window.innerWidth;
                const videoWidth = Math.min(320, screenWidth - 40);
                const videoHeight = videoWidth * 9 / 16;
                const x = (screenWidth - videoWidth) / 2;
                const y = 80;
                
                arVideoContainer.style.left = x + 'px';
                arVideoContainer.style.top = y + 'px';
                arVideoContainer.style.width = videoWidth + 'px';
                arVideoContainer.style.height = videoHeight + 'px';
            }
        });
        
        console.log("🚀 App pronto. Clique em 'Iniciar Câmera'");
    </script>
</body>
</html>
