<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta charset="UTF-8">
    <title>RA Kelly - Final</title>
    
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.0/dist/mindar-image-aframe.prod.js"></script>

    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; }
        /* Esconde elementos que podem travar a tela no celular */
        .a-enter-vr, .a-enter-ar, .mindar-ui-loading, .mindar-ui-scanning { display: none !important; }
        
        #overlay { 
            position: absolute; z-index: 9999; top: 0; left: 0; width: 100%; height: 100%; 
            display: flex; align-items: center; justify-content: center; background: #000; 
        }
        
        button { 
            padding: 20px 40px; font-size: 18px; cursor: pointer; border-radius: 50px; 
            border: 2px solid #fff; background: transparent; color: #fff; font-weight: bold; 
        }
    </style>
</head>
<body>
    <div id="overlay">
        <button id="btn-start">INICIAR EXPERIÊNCIA</button>
    </div>

    <a-scene 
        mindar-image="imageTargetSrc: targets.mind; autoStart: false; uiScanning: no; uiLoading: no;" 
        embedded 
        vr-mode-ui="enabled: false" 
        device-orientation-permission-ui="enabled: false"
        color-space="sRGB" 
        renderer="colorManagement: true, physicallyCorrectLights">
        
        <a-assets>
            <video id="vid" 
                   src="https://video.wixstatic.com/video/886022_77553c517c3b429899495057155559a9/720p/mp4/file.mp4" 
                   preload="auto" loop="true" crossorigin="anonymous" playsinline webkit-playsinline>
            </video>
        </a-assets>

        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <a-entity mindar-image-target="targetIndex: 0">
            <a-video src="#vid" width="1" height="1" position="0 0 0.1"></a-video>
        </a-entity>
    </a-scene>

    <script>
        const btn = document.getElementById('btn-start');
        const sceneEl = document.querySelector('a-scene');
        const video = document.getElementById('vid');

        btn.addEventListener('click', () => {
            console.log("Iniciando...");
            
            // 1. Tenta destravar o vídeo (necessário para iOS e Android)
            video.play().then(() => {
                video.pause(); // Destrava mas não toca ainda
            }).catch(e => console.log("Vídeo aguardando RA"));

            // 2. Inicia a RA
            const arSystem = sceneEl.systems['mindar-image-system'];
            arSystem.start(); 

            // 3. Esconde o fundo preto para mostrar a câmera
            document.getElementById('overlay').style.display = "none";
        });

        // Só dá o play real no som/vídeo quando o sistema confirmar que a câmera abriu
        sceneEl.addEventListener("arReady", () => {
            console.log("Câmera OK");
            video.play();
        });

        sceneEl.addEventListener("arError", (e) => {
            alert("Erro ao acessar câmera. Tente recarregar a página.");
        });
    </script>
</body>
</html>
