<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>AR - Vídeo na Imagem</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            max-width: 400px;
            width: 100%;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 32px;
            padding: 30px 20px;
            text-align: center;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }
        
        h1 {
            color: white;
            font-size: 1.8rem;
            margin-bottom: 10px;
        }
        
        .sub {
            color: #aaa;
            font-size: 0.9rem;
            margin-bottom: 30px;
        }
        
        .btn-camera {
            background: #2ecc71;
            color: white;
            border: none;
            padding: 18px 40px;
            border-radius: 60px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            margin-bottom: 20px;
            transition: transform 0.2s;
            box-shadow: 0 4px 15px rgba(46,204,113,0.3);
        }
        
        .btn-camera:active {
            transform: scale(0.97);
        }
        
        .status {
            background: rgba(0,0,0,0.5);
            padding: 12px;
            border-radius: 12px;
            color: #ffd700;
            font-size: 0.85rem;
            margin-top: 20px;
        }
        
        .video-preview {
            width: 100%;
            border-radius: 20px;
            margin-top: 20px;
            background: #000;
            display: none;
        }
        
        .instruction {
            color: #ccc;
            font-size: 0.75rem;
            margin-top: 20px;
        }
        
        .permission-hint {
            background: rgba(231,76,60,0.2);
            border: 1px solid #e74c3c;
            padding: 12px;
            border-radius: 12px;
            margin-top: 15px;
            font-size: 0.75rem;
            color: #e74c3c;
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📷 Escaneie a Imagem</h1>
        <div class="sub">Aponte a câmera para o frame inicial</div>
        
        <button class="btn-camera" id="startCameraBtn">📸 INICIAR CÂMERA</button>
        
        <video id="video" class="video-preview" autoplay playsinline muted></video>
        <canvas id="canvas" style="display: none;"></canvas>
        
        <div class="status" id="status">
            ⏳ Clique no botão acima
        </div>
        <div class="instruction">
            💡 O vídeo abrirá automaticamente quando a imagem for reconhecida
        </div>
        <div class="permission-hint" id="permissionHint">
            🔒 Permissão negada. Clique no ícone de câmera na barra de endereço e selecione "Permitir"
        </div>
    </div>

    <script>
        // CONFIGURAÇÕES
        const VIDEO_URL = "https://video.wixstatic.com/video/886022_77553c517c3b429899495057155559a9/720p/mp4/file.mp4";
        const TARGET_IMAGE_URL = "https://static.wixstatic.com/media/886022_cdf22739c43946babb0f7b02e640fee7~mv2.jpg";
        
        const video = document.getElementById('video');
        const startBtn = document.getElementById('startCameraBtn');
        const statusDiv = document.getElementById('status');
        const permissionHint = document.getElementById('permissionHint');
        
        let stream = null;
        let scanInterval = null;
        
        // Função para extrair cor dominante de uma região da imagem (simplificada)
        function getAverageColor(imgData, x, y, width, height) {
            let r = 0, g = 0, b = 0;
            let count = 0;
            
            for (let i = y; i < y + height && i < imgData.height; i++) {
                for (let j = x; j < x + width && j < imgData.width; j++) {
                    const idx = (i * imgData.width + j) * 4;
                    r += imgData.data[idx];
                    g += imgData.data[idx + 1];
                    b += imgData.data[idx + 2];
                    count++;
                }
            }
            
            if (count === 0) return { r: 0, g: 0, b: 0 };
            
            return {
                r: r / count,
                g: g / count,
                b: b / count
            };
        }
        
        // Função de reconhecimento simplificada (baseada em cores)
        // NOTA: Isso é uma SIMULAÇÃO. Para AR real, use a versão com QR Code abaixo.
        function startSimpleRecognition() {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            
            // Carrega a imagem alvo para comparar
            const targetImg = new Image();
            targetImg.crossOrigin = "Anonymous";
            targetImg.src = TARGET_IMAGE_URL;
            
            targetImg.onload = () => {
                statusDiv.innerHTML = "✅ Imagem carregada! Aguardando correspondência...";
                
                scanInterval = setInterval(() => {
                    if (!video.videoWidth || !video.videoHeight) return;
                    
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                    
                    // Simula detecção (para demonstração)
                    // Na prática, você precisa de uma biblioteca de visão computacional
                    statusDiv.innerHTML = "🔍 Escaneando... (aproxime a imagem)";
                    
                    // SIMULAÇÃO: após 3 segundos, "detecta" a imagem
                    // Remove isso e implemente detecção real se possível
                    
                }, 500);
            };
            
            targetImg.onerror = () => {
                statusDiv.innerHTML = "❌ Erro ao carregar imagem de referência";
            };
        }
        
        async function startCamera() {
            statusDiv.innerHTML = "🎥 Solicitando acesso à câmera...";
            
            try {
                // Tenta vários modos de câmera
                const constraints = {
                    video: {
                        facingMode: { exact: "environment" }
                    }
                };
                
                try {
                    stream = await navigator.mediaDevices.getUserMedia(constraints);
                } catch (e) {
                    // Se falhar com facingMode exact, tenta sem
                    console.log("Tentando sem facingMode...");
                    stream = await navigator.mediaDevices.getUserMedia({ video: true });
                }
                
                video.srcObject = stream;
                video.style.display = 'block';
                
                await video.play();
                
                statusDiv.innerHTML = "🔍 Câmera ativa! Aponte para a imagem";
                startBtn.style.display = 'none';
                permissionHint.style.display = 'none';
                
                // Inicia o reconhecimento
                startSimpleRecognition();
                
            } catch (error) {
                console.error("Erro detalhado:", error);
                statusDiv.innerHTML = "❌ Erro: " + error.message;
                
                if (error.name === 'NotAllowedError' || error.name === 'PermissionDeniedError') {
                    permissionHint.style.display = 'block';
                } else if (error.name === 'NotFoundError') {
                    statusDiv.innerHTML = "❌ Nenhuma câmera encontrada neste dispositivo";
                }
            }
        }
        
        startBtn.addEventListener('click', startCamera);
        
        // Limpeza ao sair
        window.addEventListener('beforeunload', () => {
            if (stream) {
                stream.getTracks().forEach(track => track.stop());
            }
            if (scanInterval) {
                clearInterval(scanInterval);
            }
        });
    </script>
</body>
</html>
