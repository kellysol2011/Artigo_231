<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Scan Image to Video</title>
    <!-- TensorFlow.js FORÇANDO CPU (resolve erro de shader) -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.15.0/dist/tf.min.js"></script>
    <script>
        // 🔧 FORÇA USAR CPU EM VEZ DE GPU (resolve erro de shader)
        tf.setBackend('cpu');
        console.log("Backend atual:", tf.getBackend());
    </script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/mobilenet@2.1.1/dist/mobilenet.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }
        .container {
            max-width: 500px;
            width: 100%;
            background: rgba(255,255,255,0.1);
            border-radius: 32px;
            padding: 20px;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }
        h1 { color: white; text-align: center; font-size: 1.5rem; margin-bottom: 8px; }
        .sub { color: #aaa; text-align: center; font-size: 0.85rem; margin-bottom: 20px; }
        .video-wrapper {
            position: relative;
            background: #000;
            border-radius: 20px;
            overflow: hidden;
            aspect-ratio: 4 / 3;
        }
        video, canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        canvas { z-index: 2; }
        video { z-index: 1; }
        .status {
            margin-top: 20px;
            padding: 15px;
            border-radius: 16px;
            text-align: center;
            font-weight: bold;
            transition: all 0.3s;
        }
        .status.scanning { background: rgba(0,0,0,0.5); color: #ffd700; }
        .status.matched { background: rgba(46,204,113,0.3); color: #2ecc71; }
        .status.waiting { background: rgba(52,152,219,0.3); color: #3498db; }
        .status.error { background: rgba(231,76,60,0.3); color: #e74c3c; }
        .similarity {
            margin-top: 12px;
            background: rgba(0,0,0,0.5);
            border-radius: 10px;
            padding: 8px;
            text-align: center;
            color: white;
            font-size: 0.85rem;
        }
        .progress-bar {
            margin-top: 8px;
            height: 8px;
            background: #333;
            border-radius: 4px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #f39c12, #e74c3c);
            transition: width 0.2s;
            border-radius: 4px;
        }
        .btn-camera {
            width: 100%;
            padding: 14px;
            margin-top: 16px;
            background: #3498db;
            border: none;
            border-radius: 50px;
            color: white;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-camera:hover { background: #2980b9; transform: scale(1.02); }
        .btn-camera:active { transform: scale(0.98); }
        .btn-camera:disabled { opacity: 0.5; cursor: not-allowed; }
        .instruction {
            color: #ccc;
            font-size: 0.75rem;
            text-align: center;
            margin-top: 16px;
        }
        .debug {
            margin-top: 12px;
            padding: 8px;
            background: rgba(0,0,0,0.5);
            border-radius: 8px;
            font-size: 0.7rem;
            color: #888;
            text-align: center;
            word-break: break-all;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>📷 Escaneie a imagem</h1>
    <div class="sub">Aponte a câmera para a imagem</div>

    <div class="video-wrapper">
        <video id="video" autoplay playsinline muted></video>
        <canvas id="canvas"></canvas>
    </div>

    <div class="status waiting" id="status">
        ⏳ Carregando modelo de IA...
    </div>
    <div class="similarity">
        Similaridade: <span id="similarity-value">0</span>%
        <div class="progress-bar">
            <div class="progress-fill" id="progress-fill"></div>
        </div>
    </div>

    <button class="btn-camera" id="startCameraBtn" disabled>📸 Iniciar Câmera</button>
    <div class="instruction">
        💡 Dica: Mantenha o celular parado por 1-2 segundos sobre a imagem.<br>
        O vídeo abrirá automaticamente quando a similaridade atingir 50%.
    </div>
    <div class="debug" id="debug"></div>
</div>

<script>
    // ============================================
    // 🔧 CONFIGURAÇÕES - SEUS LINKS
    // ============================================
    
    const VIDEO_URL = "https://video.wixstatic.com/video/886022_77553c517c3b429899495057155559a9/720p/mp4/file.mp4";
    const TARGET_IMAGE_URL = "https://static.wixstatic.com/media/886022_cdf22739c43946babb0f7b02e640fee7~mv2.jpg";
    
    // 🎯 SIMILARIDADE ALTERADA PARA 50% (0.50)
    const SIMILARITY_THRESHOLD = 0.50;
    
    // ============================================
    
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const statusDiv = document.getElementById('status');
    const similaritySpan = document.getElementById('similarity-value');
    const progressFill = document.getElementById('progress-fill');
    const startBtn = document.getElementById('startCameraBtn');
    const debugDiv = document.getElementById('debug');
    
    let model = null;
    let targetFeatures = null;
    let stream = null;
    let animationId = null;
    let isVideoOpened = false;
    
    function debugLog(msg) {
        console.log(msg);
        debugDiv.innerHTML = msg + "<br>" + debugDiv.innerHTML;
        if (debugDiv.innerHTML.split("<br>").length > 5) {
            debugDiv.innerHTML = debugDiv.innerHTML.split("<br>").slice(0, 4).join("<br>");
        }
    }
    
    async function initModelAndTarget() {
        statusDiv.innerHTML = "🔄 Carregando modelo de IA...";
        statusDiv.className = "status waiting";
        
        debugLog("Backend atual: " + tf.getBackend());
        
        try {
            debugLog("Carregando MobileNet...");
            model = await mobilenet.load();
            debugLog("✅ Modelo MobileNet carregado");
            
            statusDiv.innerHTML = "🖼️ Carregando imagem de referência...";
            
            const targetImg = new Image();
            targetImg.crossOrigin = "Anonymous";
            
            await new Promise((resolve, reject) => {
                targetImg.onload = resolve;
                targetImg.onerror = () => reject(new Error("Falha ao carregar imagem"));
                targetImg.src = TARGET_IMAGE_URL;
                setTimeout(() => reject(new Error("Timeout")), 10000);
            });
            
            debugLog("✅ Imagem carregada: " + targetImg.width + "x" + targetImg.height);
            
            const targetTensor = tf.browser.fromPixels(targetImg);
            targetFeatures = await model.infer(targetTensor, true);
            targetTensor.dispose();
            
            debugLog("✅ Imagem processada");
            statusDiv.innerHTML = "✅ Pronto! Clique em 'Iniciar Câmera'";
            statusDiv.className = "status waiting";
            startBtn.disabled = false;
            return true;
            
        } catch (error) {
            debugLog("❌ Erro: " + error.message);
            statusDiv.innerHTML = "❌ Erro: " + error.message;
            statusDiv.className = "status error";
            return false;
        }
    }
    
    function cosineSimilarity(features1, features2) {
        const a = features1.dataSync();
        const b = features2.dataSync();
        
        let dotProduct = 0, normA = 0, normB = 0;
        for (let i = 0; i < a.length; i++) {
            dotProduct += a[i] * b[i];
            normA += a[i] * a[i];
            normB += b[i] * b[i];
        }
        if (normA === 0 || normB === 0) return 0;
        return dotProduct / (Math.sqrt(normA) * Math.sqrt(normB));
    }
    
    async function compareImages(videoFrame) {
        if (!model || !targetFeatures) return 0;
        try {
            const frameFeatures = await model.infer(videoFrame, true);
            const similarity = cosineSimilarity(targetFeatures, frameFeatures);
            frameFeatures.dispose();
            return similarity;
        } catch (error) {
            return 0;
        }
    }
    
    async function scanLoop() {
        if (!stream || !video.videoWidth || !video.videoHeight) {
            animationId = requestAnimationFrame(scanLoop);
            return;
        }
        
        const ctx = canvas.getContext('2d');
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        
        const frameTensor = tf.browser.fromPixels(canvas);
        const similarity = await compareImages(frameTensor);
        frameTensor.dispose();
        
        const percent = Math.round(similarity * 100);
        similaritySpan.textContent = percent;
        progressFill.style.width = percent + "%";
        
        // Altera a cor da barra baseado no limiar de 50%
        if (similarity >= SIMILARITY_THRESHOLD) {
            progressFill.style.background = "linear-gradient(90deg, #2ecc71, #27ae60)";
        } else if (similarity >= 0.30) {
            progressFill.style.background = "linear-gradient(90deg, #f39c12, #e67e22)";
        } else {
            progressFill.style.background = "linear-gradient(90deg, #f39c12, #e74c3c)";
        }
        
        if (similarity >= SIMILARITY_THRESHOLD && !isVideoOpened) {
            statusDiv.innerHTML = "✅ IMAGEM RECONHECIDA! Abrindo vídeo...";
            statusDiv.className = "status matched";
            isVideoOpened = true;
            setTimeout(() => { window.location.href = VIDEO_URL; }, 500);
        } else if (similarity >= SIMILARITY_THRESHOLD - 0.1) {
            statusDiv.innerHTML = "🎯 Quase lá! " + percent + "% (meta: 50%)";
        } else {
            statusDiv.innerHTML = "🔍 Escaneando... " + percent + "% (precisa: 50%)";
        }
        
        animationId = requestAnimationFrame(scanLoop);
    }
    
    async function startCamera() {
        if (stream) {
            stream.getTracks().forEach(track => track.stop());
            if (animationId) cancelAnimationFrame(animationId);
        }
        
        statusDiv.innerHTML = "🎥 Solicitando acesso à câmera...";
        
        try {
            stream = await navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: "environment" } 
            });
            video.srcObject = stream;
            
            await new Promise((resolve) => {
                video.onloadedmetadata = () => { video.play(); resolve(); };
            });
            
            statusDiv.innerHTML = "🔍 Escaneando... (meta: 50%)";
            startBtn.textContent = "🔄 Reiniciar Câmera";
            animationId = requestAnimationFrame(scanLoop);
            
        } catch (error) {
            debugLog("Erro câmera: " + error.message);
            statusDiv.innerHTML = "❌ Erro ao acessar câmera";
            statusDiv.className = "status error";
        }
    }
    
    startBtn.addEventListener('click', startCamera);
    initModelAndTarget();
    
    window.addEventListener('beforeunload', () => {
        if (stream) stream.getTracks().forEach(track => track.stop());
        if (animationId) cancelAnimationFrame(animationId);
    });
</script>
</body>
</html>
