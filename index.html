<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Escaneie a imagem para abrir o vídeo</title>
    <!-- TensorFlow.js + MobileNet para reconhecimento de imagens -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/mobilenet@2.1.0/dist/mobilenet.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@3.18.0/dist/tf.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }
        .container {
            max-width: 500px;
            width: 100%;
            background: rgba(255,255,255,0.1);
            border-radius: 32px;
            padding: 20px;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }
        h1 {
            color: white;
            text-align: center;
            font-size: 1.5rem;
            margin-bottom: 8px;
        }
        .sub {
            color: #aaa;
            text-align: center;
            font-size: 0.85rem;
            margin-bottom: 20px;
        }
        .video-wrapper {
            position: relative;
            background: #000;
            border-radius: 20px;
            overflow: hidden;
            aspect-ratio: 4 / 3;
        }
        video, canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        canvas {
            z-index: 2;
        }
        video {
            z-index: 1;
        }
        .status {
            margin-top: 20px;
            padding: 15px;
            border-radius: 16px;
            text-align: center;
            font-weight: bold;
            transition: all 0.3s;
        }
        .status.scanning {
            background: rgba(0,0,0,0.5);
            color: #ffd700;
        }
        .status.matched {
            background: rgba(46,204,113,0.3);
            color: #2ecc71;
        }
        .status.waiting {
            background: rgba(52,152,219,0.3);
            color: #3498db;
        }
        .similarity {
            margin-top: 12px;
            background: rgba(0,0,0,0.5);
            border-radius: 10px;
            padding: 8px;
            text-align: center;
            color: white;
            font-size: 0.85rem;
        }
        .progress-bar {
            margin-top: 8px;
            height: 8px;
            background: #333;
            border-radius: 4px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #f39c12, #e74c3c);
            transition: width 0.2s;
            border-radius: 4px;
        }
        .btn-camera {
            width: 100%;
            padding: 14px;
            margin-top: 16px;
            background: #3498db;
            border: none;
            border-radius: 50px;
            color: white;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-camera:hover {
            background: #2980b9;
            transform: scale(1.02);
        }
        .btn-camera:active {
            transform: scale(0.98);
        }
        .instruction {
            color: #ccc;
            font-size: 0.75rem;
            text-align: center;
            margin-top: 16px;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .pulse {
            animation: pulse 1s infinite;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>📷 Escaneie a imagem</h1>
    <div class="sub">Aponte a câmera para o frame inicial do vídeo</div>

    <div class="video-wrapper">
        <video id="video" autoplay playsinline muted></video>
        <canvas id="canvas"></canvas>
    </div>

    <div class="status scanning" id="status">
        🔍 Escaneando... aponte para a imagem
    </div>
    <div class="similarity">
        Similaridade: <span id="similarity-value">0</span>%
        <div class="progress-bar">
            <div class="progress-fill" id="progress-fill"></div>
        </div>
    </div>

    <button class="btn-camera" id="startCameraBtn">📸 Iniciar Câmera</button>
    <div class="instruction">
        💡 Dica: Mantenha o celular parado por 1-2 segundos sobre a imagem.<br>
        O vídeo abrirá automaticamente quando a similaridade atingir 70%.
    </div>
</div>

<script>
    // ============================================
    // 🔧 CONFIGURAÇÕES - VOCÊ PRECISA MODIFICAR AQUI!
    // ============================================
    
    // URL do VÍDEO que será aberto quando a imagem for reconhecida
    const VIDEO_URL = "https://video.wixstatic.com/video/886022_77553c517c3b429899495057155559a9/720p/mp4/file.mp4";
    
    // URL da IMAGEM DE REFERÊNCIA (o frame inicial que será comparado)
    // Coloque uma imagem HOSPEDADA (pode ser no próprio Wix, Imgur, ou GitHub)
    const TARGET_IMAGE_URL = "https://static.wixstatic.com/media/886022_cdf22739c43946babb0f7b02e640fee7~mv2.jpg";
    
    // Limiar de similaridade (70% = 0.7). Quanto maior, mais difícil reconhecer
    const SIMILARITY_THRESHOLD = 0.70;
    
    // Quantos segundos de estabilidade antes de abrir o vídeo
    const STABILITY_SECONDS = 1.0;
    
    // ============================================
    // FIM DAS CONFIGURAÇÕES - NÃO MEXA DAQUI PRA BAIXO
    // ============================================
    
    // Elementos da UI
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const statusDiv = document.getElementById('status');
    const similaritySpan = document.getElementById('similarity-value');
    const progressFill = document.getElementById('progress-fill');
    const startBtn = document.getElementById('startCameraBtn');
    
    // Variáveis de controle
    let model = null;
    let targetFeatures = null;
    let stream = null;
    let animationId = null;
    let lastSimilarity = 0;
    let stabilityTimer = null;
    let isVideoOpened = false;
    
    // Função para carregar o modelo e a imagem alvo
    async function initModelAndTarget() {
        statusDiv.innerHTML = "🔄 Carregando modelo de IA...";
        statusDiv.className = "status waiting";
        
        try {
            // Carrega o MobileNet (modelo leve de reconhecimento)
            model = await mobilenet.load();
            console.log("✅ Modelo MobileNet carregado");
            
            statusDiv.innerHTML = "🖼️ Carregando imagem de referência...";
            
            // Carrega a imagem alvo
            const targetImg = new Image();
            targetImg.crossOrigin = "Anonymous";
            
            await new Promise((resolve, reject) => {
                targetImg.onload = resolve;
                targetImg.onerror = () => reject(new Error("Falha ao carregar imagem alvo. Verifique a URL."));
                targetImg.src = TARGET_IMAGE_URL;
            });
            
            // Extrai as características (features) da imagem alvo
            const targetTensor = tf.browser.fromPixels(targetImg);
            targetFeatures = await model.infer(targetTensor, true);
            targetTensor.dispose();
            
            console.log("✅ Imagem de referência processada");
            statusDiv.innerHTML = "📷 Clique em 'Iniciar Câmera' para começar";
            statusDiv.className = "status waiting";
            return true;
        } catch (error) {
            console.error("Erro ao carregar modelo/imagem:", error);
            statusDiv.innerHTML = "❌ Erro ao carregar: " + error.message + "<br>Verifique as URLs configuradas";
            statusDiv.className = "status waiting";
            return false;
        }
    }
    
    // Função para comparar duas imagens usando MobileNet
    async function compareImages(videoFrame) {
        if (!model || !targetFeatures) return 0;
        
        try {
            // Obtém features do frame da câmera
            const frameFeatures = await model.infer(videoFrame, true);
            
            // Calcula similaridade por cosseno
            const similarity = cosineSimilarity(targetFeatures, frameFeatures);
            
            frameFeatures.dispose();
            
            return similarity;
        } catch (error) {
            console.error("Erro na comparação:", error);
            return 0;
        }
    }
    
    // Calcula similaridade entre dois vetores de features
    function cosineSimilarity(features1, features2) {
        const a = features1.dataSync();
        const b = features2.dataSync();
        
        let dotProduct = 0;
        let normA = 0;
        let normB = 0;
        
        for (let i = 0; i < a.length; i++) {
            dotProduct += a[i] * b[i];
            normA += a[i] * a[i];
            normB += b[i] * b[i];
        }
        
        if (normA === 0 || normB === 0) return 0;
        return dotProduct / (Math.sqrt(normA) * Math.sqrt(normB));
    }
    
    // Função principal do loop de escaneamento
    async function scanLoop() {
        if (!stream || !video.videoWidth || !video.videoHeight) {
            animationId = requestAnimationFrame(scanLoop);
            return;
        }
        
        const ctx = canvas.getContext('2d');
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        
        // Desenha o frame atual no canvas (para processamento)
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        
        // Cria tensor a partir do canvas
        const frameTensor = tf.browser.fromPixels(canvas);
        
        // Compara com a imagem alvo
        const similarity = await compareImages(frameTensor);
        frameTensor.dispose();
        
        // Atualiza UI com a similaridade
        const percent = Math.round(similarity * 100);
        similaritySpan.textContent = percent;
        progressFill.style.width = percent + "%";
        
        // Altera cor da barra baseado na similaridade
        if (similarity >= SIMILARITY_THRESHOLD) {
            progressFill.style.background = "linear-gradient(90deg, #2ecc71, #27ae60)";
        } else if (similarity >= 0.4) {
            progressFill.style.background = "linear-gradient(90deg, #f39c12, #e67e22)";
        } else {
            progressFill.style.background = "linear-gradient(90deg, #f39c12, #e74c3c)";
        }
        
        // Verifica se atingiu o limiar e não abriu vídeo ainda
        if (similarity >= SIMILARITY_THRESHOLD && !isVideoOpened) {
            if (statusDiv.innerText !== "✅ IMAGEM RECONHECIDA!") {
                statusDiv.innerHTML = "✅ IMAGEM RECONHECIDA! Abrindo vídeo...";
                statusDiv.className = "status matched";
                
                // Pequeno delay para feedback visual
                setTimeout(() => {
                    if (!isVideoOpened) {
                        isVideoOpened = true;
                        window.location.href = VIDEO_URL;
                    }
                }, 500);
            }
        } else if (similarity >= SIMILARITY_THRESHOLD - 0.1 && similarity < SIMILARITY_THRESHOLD) {
            statusDiv.innerHTML = "🎯 Quase lá! Aproxime mais a câmera...";
            statusDiv.className = "status scanning";
        } else {
            statusDiv.innerHTML = "🔍 Escaneando... aponte para a imagem";
            statusDiv.className = "status scanning";
        }
        
        // Continua o loop
        animationId = requestAnimationFrame(scanLoop);
    }
    
    // Inicia a câmera
    async function startCamera() {
        if (stream) {
            // Já tem stream, para tudo e recomeça
            stopCamera();
        }
        
        statusDiv.innerHTML = "🎥 Solicitando acesso à câmera...";
        
        try {
            stream = await navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: "environment" } // Tenta usar câmera traseira
            });
            video.srcObject = stream;
            
            // Aguarda o vídeo carregar
            await new Promise((resolve) => {
                video.onloadedmetadata = () => {
                    video.play();
                    resolve();
                };
            });
            
            statusDiv.innerHTML = "🔍 Escaneando... aponte para a imagem";
            statusDiv.className = "status scanning";
            startBtn.textContent = "🔄 Reiniciar Câmera";
            
            // Inicia o loop de escaneamento
            if (animationId) cancelAnimationFrame(animationId);
            animationId = requestAnimationFrame(scanLoop);
            
        } catch (error) {
            console.error("Erro ao acessar câmera:", error);
            let errorMsg = "Não foi possível acessar a câmera.";
            if (error.name === "NotAllowedError") {
                errorMsg = "Permissão negada. Clique no ícone de câmera na barra de endereço.";
            } else if (error.name === "NotFoundError") {
                errorMsg = "Nenhuma câmera encontrada neste dispositivo.";
            }
            statusDiv.innerHTML = "❌ " + errorMsg;
            statusDiv.className = "status waiting";
        }
    }
    
    // Para a câmera e limpa
    function stopCamera() {
        if (stream) {
            stream.getTracks().forEach(track => track.stop());
            stream = null;
        }
        if (animationId) {
            cancelAnimationFrame(animationId);
            animationId = null;
        }
        video.srcObject = null;
    }
    
    // Evento do botão
    startBtn.addEventListener('click', () => {
        if (isVideoOpened) {
            // Se já abriu vídeo, recarrega a página
            window.location.reload();
        } else {
            startCamera();
        }
    });
    
    // Inicialização: carrega modelo e imagem alvo
    initModelAndTarget().then(success => {
        if (!success) {
            startBtn.disabled = true;
            startBtn.style.opacity = "0.5";
        } else {
            startBtn.disabled = false;
        }
    });
    
    // Limpeza ao sair da página
    window.addEventListener('beforeunload', () => {
        if (stream) {
            stream.getTracks().forEach(track => track.stop());
        }
        if (animationId) {
            cancelAnimationFrame(animationId);
        }
    });
</script>
</body>
</html>
