<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Scanner de Imagem - Preto e Branco</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            max-width: 450px;
            width: 100%;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 32px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }
        
        h1 {
            color: white;
            font-size: 1.5rem;
            margin-bottom: 8px;
        }
        
        .sub {
            color: #aaa;
            font-size: 0.85rem;
            margin-bottom: 20px;
        }
        
        .video-wrapper {
            position: relative;
            background: #000;
            border-radius: 20px;
            overflow: hidden;
            aspect-ratio: 4 / 3;
            margin-bottom: 16px;
        }
        
        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .btn-camera {
            background: #2ecc71;
            color: white;
            border: none;
            padding: 16px 32px;
            border-radius: 60px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            margin-bottom: 16px;
            transition: transform 0.2s;
        }
        
        .btn-camera:active {
            transform: scale(0.97);
        }
        
        .status {
            background: rgba(0,0,0,0.6);
            padding: 12px;
            border-radius: 12px;
            color: #ffd700;
            font-size: 0.85rem;
            font-weight: bold;
        }
        
        .similarity {
            margin-top: 12px;
            background: rgba(0,0,0,0.5);
            border-radius: 10px;
            padding: 8px;
            color: white;
            font-size: 0.85rem;
        }
        
        .progress-bar {
            margin-top: 8px;
            height: 8px;
            background: #333;
            border-radius: 4px;
            overflow: hidden;
        }
        
        .progress-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #f39c12, #e74c3c);
            transition: width 0.1s;
            border-radius: 4px;
        }
        
        .instruction {
            color: #ccc;
            font-size: 0.7rem;
            margin-top: 12px;
        }
        
        .permission-hint {
            background: rgba(231,76,60,0.2);
            border: 1px solid #e74c3c;
            padding: 10px;
            border-radius: 12px;
            margin-top: 12px;
            font-size: 0.7rem;
            color: #e74c3c;
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📷 Escaneie a Imagem</h1>
        <div class="sub">Aponte a câmera para a imagem</div>
        
        <div class="video-wrapper">
            <video id="video" autoplay playsinline muted></video>
        </div>
        
        <button class="btn-camera" id="startCameraBtn">📸 INICIAR CÂMERA</button>
        
        <div class="similarity">
            Correspondência: <span id="similarity-value">0</span>%
            <div class="progress-bar">
                <div class="progress-fill" id="progress-fill"></div>
            </div>
        </div>
        
        <div class="status" id="status">
            ⏳ Clique em "Iniciar Câmera"
        </div>
        
        <div class="instruction">
            💡 Dica: Imagem em preto e branco é mais fácil de reconhecer!<br>
            Mantenha o celular parado por 1-2 segundos sobre a imagem.
        </div>
        
        <div class="permission-hint" id="permissionHint">
            🔒 Permissão negada. Clique no ícone de câmera na barra de endereço.
        </div>
    </div>

    <script>
        // ============================================
        // CONFIGURAÇÕES - IMAGEM PRETO E BRANCO
        // ============================================
        
        const VIDEO_URL = "https://video.wixstatic.com/video/886022_77553c517c3b429899495057155559a9/720p/mp4/file.mp4";
        const TARGET_IMAGE_URL = "https://static.wixstatic.com/media/886022_cdf22739c43946babb0f7b02e640fee7~mv2.jpg";
        
        // Limiar de detecção (mais baixo para preto e branco - 45%)
        const DETECTION_THRESHOLD = 0.45;
        
        // ============================================
        
        const video = document.getElementById('video');
        const startBtn = document.getElementById('startCameraBtn');
        const statusDiv = document.getElementById('status');
        const similaritySpan = document.getElementById('similarity-value');
        const progressFill = document.getElementById('progress-fill');
        const permissionHint = document.getElementById('permissionHint');
        
        let stream = null;
        let scanInterval = null;
        let targetHistogram = null;
        let isVideoOpened = false;
        
        // Converte imagem para escala de cinza e calcula histograma
        function getGrayscaleHistogram(imgData, width, height) {
            const histogram = new Array(256).fill(0);
            
            for (let i = 0; i < imgData.data.length; i += 4) {
                // Fórmula de luminância (percepção humana)
                const gray = Math.round(0.299 * imgData.data[i] + 0.587 * imgData.data[i+1] + 0.114 * imgData.data[i+2]);
                histogram[gray]++;
            }
            
            // Normaliza o histograma
            const total = imgData.data.length / 4;
            for (let i = 0; i < 256; i++) {
                histogram[i] = histogram[i] / total;
            }
            
            return histogram;
        }
        
        // Calcula similaridade entre dois histogramas (método de interseção)
        function compareHistograms(hist1, hist2) {
            let similarity = 0;
            for (let i = 0; i < 256; i++) {
                similarity += Math.min(hist1[i], hist2[i]);
            }
            return similarity;
        }
        
        // Detecta bordas na imagem (importante para preto e branco)
        function detectEdges(imgData, width, height) {
            // Versão simplificada - conta pixels de borda
            let edgePixels = 0;
            let totalPixels = 0;
            
            for (let y = 1; y < height - 1; y++) {
                for (let x = 1; x < width - 1; x++) {
                    const idx = (y * width + x) * 4;
                    const gray = 0.299 * imgData.data[idx] + 0.587 * imgData.data[idx+1] + 0.114 * imgData.data[idx+2];
                    
                    // Pixels vizinhos
                    const idxUp = ((y-1) * width + x) * 4;
                    const grayUp = 0.299 * imgData.data[idxUp] + 0.587 * imgData.data[idxUp+1] + 0.114 * imgData.data[idxUp+2];
                    
                    const diff = Math.abs(gray - grayUp);
                    if (diff > 30) edgePixels++;
                    totalPixels++;
                }
            }
            
            return edgePixels / totalPixels;
        }
        
        // Função principal de reconhecimento
        async function loadTargetImage() {
            statusDiv.innerHTML = "🖼️ Carregando imagem de referência...";
            
            return new Promise((resolve, reject) => {
                const img = new Image();
                img.crossOrigin = "Anonymous";
                
                img.onload = () => {
                    // Cria canvas para processar a imagem alvo
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');
                    canvas.width = img.width;
                    canvas.height = img.height;
                    ctx.drawImage(img, 0, 0);
                    
                    const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                    
                    // Calcula histograma da imagem alvo
                    targetHistogram = getGrayscaleHistogram(imgData, canvas.width, canvas.height);
                    
                    console.log("✅ Imagem de referência carregada!");
                    console.log("Histograma calculado");
                    
                    statusDiv.innerHTML = "✅ Imagem carregada! Inicie a câmera.";
                    resolve();
                };
                
                img.onerror = () => {
                    reject(new Error("Falha ao carregar imagem de referência"));
                };
                
                img.src = TARGET_IMAGE_URL;
            });
        }
        
        // Compara o frame atual com a imagem alvo
        function compareWithTarget(videoFrame) {
            if (!targetHistogram) return 0;
            
            // Calcula histograma do frame
            const frameHistogram = getGrayscaleHistogram(videoFrame, videoFrame.width, videoFrame.height);
            
            // Calcula similaridade
            const similarity = compareHistograms(targetHistogram, frameHistogram);
            
            return similarity;
        }
        
        // Loop de escaneamento
        function startScanning() {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            let lastSimilarity = 0;
            let stableCount = 0;
            
            scanInterval = setInterval(() => {
                if (!video.videoWidth || !video.videoHeight) return;
                
                // Captura frame atual
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                
                // Reduz resolução para processamento mais rápido
                const tempCanvas = document.createElement('canvas');
                const tempCtx = tempCanvas.getContext('2d');
                const smallWidth = Math.floor(canvas.width / 2);
                const smallHeight = Math.floor(canvas.height / 2);
                tempCanvas.width = smallWidth;
                tempCanvas.height = smallHeight;
                tempCtx.drawImage(canvas, 0, 0, smallWidth, smallHeight);
                
                const imgData = tempCtx.getImageData(0, 0, smallWidth, smallHeight);
                
                // Calcula similaridade
                let similarity = compareWithTarget(imgData);
                
                // Garante que similarity é um número válido
                if (isNaN(similarity)) similarity = 0;
                
                // Atualiza UI
                const percent = Math.round(similarity * 100);
                similaritySpan.textContent = percent;
                progressFill.style.width = percent + "%";
                
                // Muda cor da barra baseado na similaridade
                if (similarity >= DETECTION_THRESHOLD) {
                    progressFill.style.background = "linear-gradient(90deg, #2ecc71, #27ae60)";
                } else if (similarity >= 0.3) {
                    progressFill.style.background = "linear-gradient(90deg, #f39c12, #e67e22)";
                } else {
                    progressFill.style.background = "linear-gradient(90deg, #e74c3c, #c0392b)";
                }
                
                // Verifica estabilidade (evita falsos positivos)
                if (similarity >= DETECTION_THRESHOLD) {
                    if (Math.abs(similarity - lastSimilarity) < 0.05) {
                        stableCount++;
                    } else {
                        stableCount = 0;
                    }
                    
                    if (stableCount >= 5 && !isVideoOpened) {
                        statusDiv.innerHTML = "✅ IMAGEM RECONHECIDA! Abrindo vídeo...";
                        statusDiv.style.color = "#2ecc71";
                        isVideoOpened = true;
                        
                        setTimeout(() => {
                            window.location.href = VIDEO_URL;
                        }, 500);
                    } else {
                        statusDiv.innerHTML = "🎯 IMAGEM DETECTADA! Mantenha firme... " + percent + "%";
                        statusDiv.style.color = "#2ecc71";
                    }
                } else {
                    stableCount = 0;
                    if (similarity > 0.3) {
                        statusDiv.innerHTML = "🔍 Aproxime mais a câmera... " + percent + "%";
                        statusDiv.style.color = "#f39c12";
                    } else {
                        statusDiv.innerHTML = "🔍 Escaneando... aponte para a imagem";
                        statusDiv.style.color = "#ffd700";
                    }
                }
                
                lastSimilarity = similarity;
                
            }, 150); // 150ms entre cada frame
        }
        
        async function startCamera() {
            statusDiv.innerHTML = "🎥 Solicitando acesso à câmera...";
            
            try {
                // Primeiro tenta câmera traseira
                const constraints = {
                    video: { facingMode: { exact: "environment" } }
                };
                
                try {
                    stream = await navigator.mediaDevices.getUserMedia(constraints);
                } catch (e) {
                    console.log("Tentando câmera padrão...");
                    stream = await navigator.mediaDevices.getUserMedia({ video: true });
                }
                
                video.srcObject = stream;
                await video.play();
                
                statusDiv.innerHTML = "🔍 Câmera ativa! Aponte para a imagem";
                startBtn.style.display = 'none';
                permissionHint.style.display = 'none';
                
                // Aguarda um momento e inicia o escaneamento
                setTimeout(() => {
                    startScanning();
                }, 500);
                
            } catch (error) {
                console.error("Erro:", error);
                statusDiv.innerHTML = "❌ Erro: " + error.message;
                
                if (error.name === 'NotAllowedError' || error.name === 'PermissionDeniedError') {
                    permissionHint.style.display = 'block';
                }
            }
        }
        
        // Carrega a imagem alvo primeiro
        async function init() {
            try {
                await loadTargetImage();
                startBtn.disabled = false;
                startBtn.style.opacity = "1";
            } catch (error) {
                statusDiv.innerHTML = "❌ " + error.message;
                startBtn.disabled = true;
                startBtn.style.opacity = "0.5";
            }
        }
        
        startBtn.addEventListener('click', startCamera);
        
        // Limpeza
        window.addEventListener('beforeunload', () => {
            if (stream) {
                stream.getTracks().forEach(track => track.stop());
            }
            if (scanInterval) {
                clearInterval(scanInterval);
            }
        });
        
        // Inicializa
        init();
    </script>
</body>
</html>
