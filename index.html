<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta charset="UTF-8">
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.0/dist/mindar-image-aframe.prod.js"></script>
    <style>
        body { margin: 0; overflow: hidden; font-family: sans-serif; background: #000; }
        #overlay { position: absolute; z-index: 1000; top: 0; left: 0; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; background: #000; color: #fff; }
        button { padding: 20px 40px; font-size: 18px; cursor: pointer; border-radius: 50px; border: 2px solid #fff; background: transparent; color: #fff; text-transform: uppercase; }
    </style>
</head>
<body>
    <div id="overlay"><button id="btn">Iniciar Experiência</button></div>

    <a-scene mindar-image="imageTargetSrc: https://gist.githubusercontent.com/kellysol2011/fcce8c7450012610f079b2b97e987b5b/raw/00cf5e41cffc36eb45e454242be5321c01844750/targets.txt; uiScanning: #scanning-overlay;" 
             embedded color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights" 
             vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
        
     <a-assets timeout="30000">
    <video id="vid" src="https://video.wixstatic.com/video/886022_77553c517c3b429899495057155559a9/720p/mp4/file.mp4" 
           preload="auto" loop="true" crossorigin="anonymous" playsinline></video>
</a-assets>

        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <a-entity mindar-image-target="targetIndex: 0">
            <a-video src="#vid" width="1" height="1" position="0 0 0"></a-video>
        </a-entity>
    </a-scene>

    <script>
        const btn = document.getElementById('btn');
        btn.addEventListener('click', () => {
            document.getElementById('overlay').style.display = 'none';
            document.getElementById('vid').play();
        });
    </script>
</body>
</html>
